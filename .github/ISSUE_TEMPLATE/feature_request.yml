name: Feature request
description: Propose an improvement to the product or developer workflow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or maintainer problem does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, workflow, or UI you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Small improvement
        - Medium workflow improvement
        - Large product change
        - Unsure
