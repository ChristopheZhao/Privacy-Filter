name: Bug report
description: Report a reproducible bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps, sample text, and settings when relevant.
      placeholder: |
        1. Open ...
        2. Paste ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: App version, branch, or commit hash
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI
        - Regex preview
        - Local LLM deep filter
        - Benchmark tooling
        - Packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, model, provider, and any relevant local setup details
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets or personal data before attaching anything.
